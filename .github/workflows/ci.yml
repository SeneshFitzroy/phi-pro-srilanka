# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                  PHI-PRO — Continuous Integration Pipeline                   ║
# ║                                                                              ║
# ║  Enterprise-grade CI with parallel jobs, matrix testing, security scanning,  ║
# ║  performance budgets, accessibility audits, and intelligent path filtering.  ║
# ║                                                                              ║
# ║  Author : Dinura Sachintha Mendis (10952757)                                 ║
# ║  Stack  : Next.js 14 · TypeScript 5 · Firebase · pnpm · Turborepo           ║
# ║  Runs on: ubuntu-latest (GitHub-hosted)                                      ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

name: '🔄 CI Pipeline'

# ──────────────────────────────── Triggers ────────────────────────────────────
on:
  push:
    branches: [main, develop, 'release/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]

# ──────────────────────── Concurrency Control ─────────────────────────────────
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# ──────────────────────── Environment Variables ───────────────────────────────
env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.30.3'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  HUSKY: 0
  CI: true

# ──────────────────────── Permissions (Least Privilege) ───────────────────────
permissions:
  contents: read
  pull-requests: write
  security-events: write
  checks: write
  actions: read

# ═══════════════════════════════════════════════════════════════════════════════
#  JOBS
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  Pre-flight: Detect changed paths → skip irrelevant jobs               │
  # └─────────────────────────────────────────────────────────────────────────┘
  changes:
    name: '🔎 Detect Changes'
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      docs: ${{ steps.filter.outputs.docs }}
      ci: ${{ steps.filter.outputs.ci }}
      deps: ${{ steps.filter.outputs.deps }}
      firebase: ${{ steps.filter.outputs.firebase }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect file changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'apps/**'
              - 'packages/**'
              - 'tsconfig*.json'
              - 'turbo.json'
            docs:
              - '*.md'
              - 'docs/**'
              - '.github/ISSUE_TEMPLATE/**'
            ci:
              - '.github/workflows/**'
            deps:
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'apps/**/package.json'
              - 'packages/**/package.json'
            firebase:
              - 'firestore.*'
              - 'storage.rules'
              - 'firebase.json'
            docker:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - '.dockerignore'

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  Stage 1: Install & Cache Dependencies                                 │
  # └─────────────────────────────────────────────────────────────────────────┘
  install:
    name: '📦 Install Dependencies'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.deps == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache workspace
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            ~/.pnpm-store
          key: workspace-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  Stage 2a: Lint & Format Check                                         │
  # └─────────────────────────────────────────────────────────────────────────┘
  lint:
    name: '🔍 Lint & Format'
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore workspace cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            ~/.pnpm-store
          key: workspace-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            workspace-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint 2>&1 | tee eslint-report.txt
        continue-on-error: true

      - name: Check Prettier formatting
        run: pnpm format --check 2>&1 | tee prettier-report.txt
        continue-on-error: true

      - name: Report lint results
        if: always()
        run: |
          echo "## 🔍 Lint & Format Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          WARNINGS=$(grep -c "warning" eslint-report.txt 2>/dev/null || echo "0")
          ERRORS=$(grep -c "error" eslint-report.txt 2>/dev/null || echo "0")
          echo "| Check | Count | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint Errors | $ERRORS | $( [ "$ERRORS" = "0" ] && echo '✅' || echo '❌' ) |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint Warnings | $WARNINGS | ⚠️ |" >> $GITHUB_STEP_SUMMARY
          echo "| Prettier | — | ✅ |" >> $GITHUB_STEP_SUMMARY

      - name: Fail on lint errors
        run: |
          pnpm lint
          pnpm format --check

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  Stage 2b: TypeScript Type Checking (Strict Mode)                      │
  # └─────────────────────────────────────────────────────────────────────────┘
  type-check:
    name: '🏷️ TypeScript Check'
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore workspace cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            ~/.pnpm-store
          key: workspace-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            workspace-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript compiler (strict)
        run: pnpm type-check

      - name: Report type-check
        if: always()
        run: |
          echo "## 🏷️ TypeScript Type Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Mode | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| @phi-pro/web | strict | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| @phi-pro/shared | strict | ✅ Passed |" >> $GITHUB_STEP_SUMMARY

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  Stage 2c: Unit & Integration Tests (Sharded Matrix)                   │
  # └─────────────────────────────────────────────────────────────────────────┘
  test:
    name: '🧪 Test (shard ${{ matrix.shard }}/${{ strategy.job-total }})'
    runs-on: ubuntu-latest
    needs: install
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore workspace cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            ~/.pnpm-store
          key: workspace-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            workspace-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (shard ${{ matrix.shard }}/3)
        run: pnpm test -- --shard=${{ matrix.shard }}/3 --coverage --reporters=default --reporters=github-actions
        env:
          CI: true
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload coverage (shard ${{ matrix.shard }})
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  Stage 2d: Security Scan (CodeQL + Dependency Audit)                   │
  # └─────────────────────────────────────────────────────────────────────────┘
  security:
    name: '🛡️ Security Scan'
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore workspace cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            ~/.pnpm-store
          key: workspace-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            workspace-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (high + critical)
        run: |
          echo "## 🛡️ Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          pnpm audit --audit-level=high 2>&1 | tee audit-report.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 audit-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  Stage 3: Production Build Verification                                │
  # └─────────────────────────────────────────────────────────────────────────┘
  build:
    name: '🏗️ Build'
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    outputs:
      build-size: ${{ steps.size.outputs.total }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore workspace cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            ~/.pnpm-store
          key: workspace-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            workspace-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Build all packages (Turborepo)
        run: pnpm build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Measure build output
        id: size
        run: |
          if [ -d "apps/web/.next" ]; then
            TOTAL=$(du -sh apps/web/.next --exclude=cache | cut -f1)
            STATIC=$(du -sh apps/web/.next/static 2>/dev/null | cut -f1 || echo "N/A")
            PAGES=$(find apps/web/.next/server/app -name '*.html' 2>/dev/null | wc -l || echo "0")
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "## 🏗️ Build Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Build Size | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| Static Assets | $STATIC |" >> $GITHUB_STEP_SUMMARY
            echo "| Pages Generated | $PAGES |" >> $GITHUB_STEP_SUMMARY
            echo "| Build Cache | ✅ Enabled |" >> $GITHUB_STEP_SUMMARY
            echo "| Turborepo | ✅ Active |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ github.sha }}
          path: |
            apps/web/.next
            !apps/web/.next/cache
          retention-days: 3

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  Stage 3b: Bundle Size Analysis (PRs Only)                             │
  # └─────────────────────────────────────────────────────────────────────────┘
  bundle-analysis:
    name: '📊 Bundle Analysis'
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output-${{ github.sha }}
          path: apps/web/.next

      - name: Analyze bundle size
        uses: hashicorp/nextjs-bundle-analysis@v0.1
        with:
          workflow-id: ci.yml
          base-branch: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  Stage 3c: Lighthouse Performance Audit (PRs Only)                     │
  # └─────────────────────────────────────────────────────────────────────────┘
  lighthouse:
    name: '🔦 Lighthouse Audit'
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

      - name: Report Lighthouse scores
        if: always()
        run: |
          echo "## 🔦 Lighthouse Audit Targets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Minimum Score |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | ≥ 90 |" >> $GITHUB_STEP_SUMMARY
          echo "| Accessibility | ≥ 95 |" >> $GITHUB_STEP_SUMMARY
          echo "| Best Practices | ≥ 95 |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO | ≥ 90 |" >> $GITHUB_STEP_SUMMARY
          echo "| PWA | ≥ 80 |" >> $GITHUB_STEP_SUMMARY

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  Stage 3d: Docker Build Verification                                   │
  # └─────────────────────────────────────────────────────────────────────────┘
  docker:
    name: '🐳 Docker Build'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.src == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: phi-pro:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            NEXT_TELEMETRY_DISABLED=1

      - name: Report Docker build
        run: |
          echo "## 🐳 Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`phi-pro:ci-${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Cache | GitHub Actions |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Verified |" >> $GITHUB_STEP_SUMMARY

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  Stage 4: Merge Coverage Reports                                       │
  # └─────────────────────────────────────────────────────────────────────────┘
  coverage:
    name: '📈 Coverage Report'
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all coverage shards
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-shard-*
          merge-multiple: true
          path: coverage/

      - name: Report coverage summary
        if: always()
        run: |
          echo "## 📈 Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "coverage/coverage-summary.json" ]; then
            echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
            echo "| Shards | 3 parallel |" >> $GITHUB_STEP_SUMMARY
            echo "| Data | ✅ Collected |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No coverage data (tests may have been skipped)." >> $GITHUB_STEP_SUMMARY
          fi

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  Stage 5: CI Status Gate — Required for branch protection              │
  # └─────────────────────────────────────────────────────────────────────────┘
  ci-status:
    name: '✅ CI Gate'
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, build, security]
    if: always()
    steps:
      - name: Evaluate CI results
        run: |
          echo "## ✅ CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY

          FAILED=false

          declare -A RESULTS=(
            [lint]="${{ needs.lint.result }}"
            [type-check]="${{ needs.type-check.result }}"
            [test]="${{ needs.test.result }}"
            [build]="${{ needs.build.result }}"
            [security]="${{ needs.security.result }}"
          )

          for JOB in lint type-check test build security; do
            RESULT=${RESULTS[$JOB]}
            if [[ "$RESULT" == "failure" ]]; then
              echo "| $JOB | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
              FAILED=true
            elif [[ "$RESULT" == "cancelled" ]]; then
              echo "| $JOB | ⏭️ Cancelled |" >> $GITHUB_STEP_SUMMARY
            elif [[ "$RESULT" == "skipped" ]]; then
              echo "| $JOB | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $JOB | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "$FAILED" == "true" ]]; then
            echo "**❌ CI Failed** — fix failing jobs before merging." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "**✅ All CI checks passed.**" >> $GITHUB_STEP_SUMMARY
