# PHI-PRO — Security Analysis Pipeline
# CodeQL static analysis, dependency review, secret scanning and npm audit.
# Runs on every PR to main/develop, on a weekly cron, and on manual dispatch.

name: 'Security Analysis'

on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 4 * * 3'   # Wednesdays 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write
  actions: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # CodeQL Advanced Security Scanning
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'

  # ---------------------------------------------------------------------------
  # Dependency Review (blocks vulnerable deps on PRs)
  # ---------------------------------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always

  # ---------------------------------------------------------------------------
  # Secret Scanning (TruffleHog + grep for common leaked patterns)
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          extra_args: --only-verified --results=verified

      - name: Grep for common credential patterns
        shell: bash
        run: |
          set -u
          ISSUES=0
          echo "## Secret Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Google API keys
          if grep -rEn "AIza[0-9A-Za-z_-]{35}" \
              --include="*.ts" --include="*.tsx" --include="*.js" \
              --exclude-dir=node_modules --exclude-dir=.next \
              . 2>/dev/null | grep -v '\.example' > /tmp/google.txt && [ -s /tmp/google.txt ]; then
            echo "::warning::Possible Google API key in source"
            ISSUES=$((ISSUES + 1))
          fi

          # AWS access keys
          if grep -rEn "AKIA[0-9A-Z]{16}" \
              --include="*.ts" --include="*.tsx" --include="*.js" \
              --exclude-dir=node_modules --exclude-dir=.next \
              . 2>/dev/null > /tmp/aws.txt && [ -s /tmp/aws.txt ]; then
            echo "::warning::Possible AWS key in source"
            ISSUES=$((ISSUES + 1))
          fi

          # Private key blocks
          if grep -rEn "BEGIN.*PRIVATE KEY" \
              --include="*.ts" --include="*.tsx" --include="*.js" --include="*.pem" \
              --exclude-dir=node_modules \
              . 2>/dev/null > /tmp/pk.txt && [ -s /tmp/pk.txt ]; then
            echo "::warning::Private key material in source"
            ISSUES=$((ISSUES + 1))
          fi

          if [ "$ISSUES" -eq 0 ]; then
            echo "No secrets detected in source code." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**$ISSUES potential secret(s) found.** Review the workflow logs." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ---------------------------------------------------------------------------
  # npm audit (uses pnpm)
  # ---------------------------------------------------------------------------
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.30.3'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: |
          echo "## Dependency Audit" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          pnpm audit --audit-level=high 2>&1 | tail -50 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Aggregate gate
  # ---------------------------------------------------------------------------
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [codeql, secret-scan, npm-audit]
    if: always()
    steps:
      - name: Summary
        run: |
          {
            echo "## Security Analysis Summary"
            echo ""
            echo "| Scan          | Result |"
            echo "|---------------|--------|"
            echo "| CodeQL        | ${{ needs.codeql.result }} |"
            echo "| Secret Scan   | ${{ needs.secret-scan.result }} |"
            echo "| npm Audit     | ${{ needs.npm-audit.result }} |"
            echo ""
            echo "Scanned: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } >> "$GITHUB_STEP_SUMMARY"
