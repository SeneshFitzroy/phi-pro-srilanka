# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                  PHI-PRO — Security Analysis Pipeline                        ║
# ║                                                                              ║
# ║  Advanced security scanning with CodeQL, dependency review, and              ║
# ║  supply chain attack prevention.                                             ║
# ║                                                                              ║
# ║  Runs on: Every PR to main/develop + Weekly schedule                         ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

name: '🔐 Security Analysis'

# ──────────────────────────────── Triggers ────────────────────────────────────
on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 4 * * 3'     # Every Wednesday at 4 AM UTC
  workflow_dispatch:

# ──────────────────────── Permissions ─────────────────────────────────────────
permissions:
  contents: read
  security-events: write
  pull-requests: write
  actions: read

# ═══════════════════════════════════════════════════════════════════════════════
#  JOBS
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  CodeQL Advanced Security Scanning                                     │
  # └─────────────────────────────────────────────────────────────────────────┘
  codeql:
    name: '🔍 CodeQL Analysis'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality
          # Custom query packs for deeper analysis
          config: |
            paths-ignore:
              - node_modules
              - .next
              - '**/*.test.ts'
              - '**/*.spec.ts'

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
          output: codeql-results

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codeql-results
        continue-on-error: true

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  Dependency Review (PR only — blocks vulnerable deps)                  │
  # └─────────────────────────────────────────────────────────────────────────┘
  dependency-review:
    name: '📦 Dependency Review'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always
          allow-ghsas: []

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  Secret Scanning (detect leaked credentials)                           │
  # └─────────────────────────────────────────────────────────────────────────┘
  secret-scan:
    name: '🔑 Secret Scanning'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --results=verified
        continue-on-error: true

      - name: Check for hardcoded credentials
        run: |
          echo "## 🔑 Secret Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for common secret patterns
          ISSUES=0

          # API keys (excluding .example and .env.example files)
          FOUND=$(grep -rn "AIza[0-9A-Za-z_-]\{35\}" --include="*.ts" --include="*.tsx" --include="*.js" . 2>/dev/null | grep -v node_modules | grep -v .next | grep -v .example || true)
          if [ -n "$FOUND" ]; then
            echo "⚠️ Potential Google API key found in source code" >> $GITHUB_STEP_SUMMARY
            ISSUES=$((ISSUES + 1))
          fi

          # AWS keys
          FOUND=$(grep -rn "AKIA[0-9A-Z]\{16\}" --include="*.ts" --include="*.tsx" --include="*.js" . 2>/dev/null | grep -v node_modules | grep -v .next || true)
          if [ -n "$FOUND" ]; then
            echo "⚠️ Potential AWS key found in source code" >> $GITHUB_STEP_SUMMARY
            ISSUES=$((ISSUES + 1))
          fi

          # Private keys
          FOUND=$(grep -rn "BEGIN.*PRIVATE KEY" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.pem" . 2>/dev/null | grep -v node_modules || true)
          if [ -n "$FOUND" ]; then
            echo "⚠️ Private key found in repository" >> $GITHUB_STEP_SUMMARY
            ISSUES=$((ISSUES + 1))
          fi

          if [ $ISSUES -eq 0 ]; then
            echo "✅ No secrets detected in source code." >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **$ISSUES potential secret(s) found** — review recommended." >> $GITHUB_STEP_SUMMARY
          fi

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  OWASP Dependency Check                                                │
  # └─────────────────────────────────────────────────────────────────────────┘
  owasp:
    name: '🛡️ OWASP Check'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.30.3'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: |
          echo "## 🛡️ OWASP Dependency Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Audit Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm audit 2>&1 | tail -30 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check for known CVEs
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Headers Recommendation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Header | Recommended Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| X-Content-Type-Options | nosniff |" >> $GITHUB_STEP_SUMMARY
          echo "| X-Frame-Options | DENY |" >> $GITHUB_STEP_SUMMARY
          echo "| X-XSS-Protection | 1; mode=block |" >> $GITHUB_STEP_SUMMARY
          echo "| Strict-Transport-Security | max-age=31536000; includeSubDomains |" >> $GITHUB_STEP_SUMMARY
          echo "| Content-Security-Policy | Configured in next.config.js |" >> $GITHUB_STEP_SUMMARY
          echo "| Referrer-Policy | strict-origin-when-cross-origin |" >> $GITHUB_STEP_SUMMARY

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  Security Gate                                                         │
  # └─────────────────────────────────────────────────────────────────────────┘
  security-gate:
    name: '✅ Security Gate'
    runs-on: ubuntu-latest
    needs: [codeql, secret-scan, owasp]
    if: always()
    steps:
      - name: Security summary
        run: |
          echo "## 🔐 Security Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql.result == 'success' && '✅ Passed' || '⚠️ Review needed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result == 'success' && '✅ Clean' || '⚠️ Review needed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP | ${{ needs.owasp.result == 'success' && '✅ Passed' || '⚠️ Review needed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🕐 **Scanned:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
